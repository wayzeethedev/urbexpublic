<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding-bottom: 70px;
}

.header {
    width: 100%;
    height: 200px;
    background-image: url("https://ichef.bbci.co.uk/images/ic/480xn/p0jgrwdq.jpg.webp");
    background-size: cover;
    background-position: center;
}

.content {
    padding: 20px;
}

.navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 65px;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #ddd;
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #777;
    text-decoration: none;
}

.nav-item i {
    font-size: 20px;
    margin-bottom: 3px;
}

.nav-item.active {
    color: #ff3b3b;
}
.pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    background-color: white;
}
.username {
    font-size: 24px;
    font-weight: bold;
    margin: 50px 0 0 5px;
}
.profile-row {
    display: flex;
    align-items: center;
    padding: 0 20px;
    margin-top: -60px;
}
.description {
    margin-top: 10px;
    font-size: 14px;
    color: #555;
    padding: 0 20px;
}
.statbox {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    padding: 0 20px;
}
</style>
</head>

<body>

<div class="header"></div>
<div class="profile-row">
    <img class="pfp" src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png" alt="profile picture">
    <h2 class="username">John Doe</h2>
</div>
<div class="description">
    <p>Urban explorer, photographer, and adventure seeker. Sharing my journeys through abandoned places around the world.</p>
</div>
<div class="statbox">
    <div>
        <h3>xxx/(total locations)</h3>
        <p>Locations Unlocked</p>
    </div>
    <div>
        <h3>xx</h3>
        <p>Locations Explored</p>
    </div>
    <div>
        <h3>300</h3>
        <p>Points</p>
    </div>

<div class="content">
</div>

<div class="navbar">
    <a href="#" class="nav-item">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="#" class="nav-item">
        <i class="fa-solid fa-map"></i>
        Map
    </a>

    <a href="#" class="nav-item active">
        <i class="fa-solid fa-user"></i>
        Profile
    </a>
</div>

</body>
</html>
