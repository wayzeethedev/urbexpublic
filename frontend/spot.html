<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabs</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
    }

    .hero {
        width: 100%;
        height: 225px;
        object-fit: cover;
        display: block;
    }

    /* TABS WRAPPER */
    .tabs {
        position: relative;
        display: flex;
        width: 100%;
        border-bottom: 1px solid #ccc;
    }

    .tab {
        width: 50%;
        text-align: center;
        padding: 12px 0;
        cursor: pointer;
        font-weight: bold;
        user-select: none;
    }

    /* SLIDING UNDERLINE */
    .indicator {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 50%;
        height: 3px;
        background: black;
        transition: transform 0.3s ease;
    }

    /* CONTENT */
    .content {
        display: none;
        padding: 10px;
    }

    .content.active {
        display: block;
    }

    h1, h2, h3 {
        text-align: center;
        margin: 8px 0;
    }

    /* COMMENTS */
    .comment-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
    }

    .comment-box {
        display: flex;
        gap: 10px;
        width: 95%;
        max-width: 500px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background: #f2f2f2;
    }

    .pfp {
        width: 40px;
        height: 40px;
        border-radius: 50%;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 10px;
    }

    .tile {
        aspect-ratio: 1 / 1;
        overflow: hidden;
    }

    .tile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
</style>
</head>

<body>

<img class="hero" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVJQ7Wlqc3J5wiYQWd3LN7tNC5dlwp9ybIKA&s">

<!-- TABS -->
<div class="tabs">
    <div class="tab" onclick="showTab(0)">Overview</div>
    <div class="tab" onclick="showTab(1)">Gallery</div>

    <!-- sliding underline -->
    <div class="indicator" id="indicator"></div>
</div>

<!-- OVERVIEW -->
<div id="overview" class="content active">
    <h1>Location Title</h1>
    <h2>Coordinates</h2>
    <h3>Description here</h3>

    <div class="comment-section">
        <h2>Comments</h2>

        <div class="comment-box">
            <img class="pfp" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Default_pfp.svg/3840px-Default_pfp.svg.png">
            <div>
                <a href="#">Username</a>
                <div class="comment-text">This is a sample comment.</div>
            </div>
        </div>
    </div>
</div>

<!-- GALLERY -->
<div id="gallery" class="content">
    <div class="gallery">
        <div class="tile"><img src="https://illustoon.com/photo/7259.png"></div>
        <div class="tile"><img src="https://img.freepik.com/premium-vector/free-vector-geometrical-square-shape-white-background-vector_1123056-207.jpg?semt=ais_hybrid&w=740&q=80"></div>
        <div class="tile"><img src="https://d1nhio0ox7pgb.cloudfront.net/_img/o_collection_png/green_dark_grey/512x512/plain/shape_square.png"></div>
    </div>
</div>

<script>
function showTab(index) {
    // content switch
    document.querySelectorAll('.content').forEach((el, i) => {
        el.classList.toggle('active', i === index);
    });

    // move indicator (0% or 100%)
    const indicator = document.getElementById('indicator');
    indicator.style.transform = `translateX(${index * 100}%)`;
}
</script>

</body>
</html>
