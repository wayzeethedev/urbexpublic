<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Upload Location - Vestige</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #f5f5f5;
        padding-bottom: 80px;
    }

    .header {
        background: white;
        padding: 15px 20px;
        border-bottom: 1px solid #e5e5e5;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .header h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .back-btn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        padding: 5px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        background: white;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #ff3b3b;
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .coordinate-input-group {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .coordinate-input-group input {
        flex: 1;
    }

    .paste-btn {
        padding: 12px 16px;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        white-space: nowrap;
    }

    .paste-btn:hover {
        background: #e5e5e5;
    }

    .coordinate-preview {
        margin-top: 10px;
        padding: 10px;
        background: #f8f8f8;
        border-radius: 8px;
        font-size: 12px;
        color: #666;
        display: none;
    }

    .coordinate-preview.show {
        display: block;
    }

    .get-location-btn {
        background: #111;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 10px;
        width: 100%;
        font-size: 14px;
    }

    .get-location-btn:hover {
        opacity: 0.9;
    }

    .image-upload-area {
        border: 2px dashed #ddd;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        background: #fafafa;
    }

    .image-upload-area:hover {
        border-color: #ff3b3b;
    }

    .image-upload-area i {
        font-size: 40px;
        color: #999;
        margin-bottom: 10px;
    }

    .image-preview-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 15px;
    }

    .image-preview {
        position: relative;
        aspect-ratio: 1;
        border-radius: 12px;
        overflow: hidden;
        background: #f0f0f0;
    }

    .image-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .remove-image {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 12px;
    }

    .level-options {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
        margin-top: 10px;
    }

    .level-option {
        background: white;
        border: 2px solid #e5e5e5;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .level-option.selected {
        border-color: #ff3b3b;
        background: #fff5f5;
    }

    .level-option img {
        width: 50px;
        height: 50px;
        object-fit: contain;
        margin-bottom: 8px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .level-option span {
        font-size: 12px;
        font-weight: 500;
        display: block;
    }

    .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
    }

    .tag-chip {
        background: white;
        border: 2px solid #e5e5e5;
        border-radius: 30px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .tag-chip.selected {
        border-color: #ff3b3b;
        background: #fff5f5;
    }

    .tag-chip img {
        width: 20px;
        height: 20px;
        object-fit: contain;
    }

    .tag-chip span {
        font-size: 13px;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: #ff3b3b;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
    }

    .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        text-decoration: none;
        color: #5e6873;
        font-size: 0.75rem;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 8px 0;
    }

    .nav-item i {
        font-size: 1.6rem;
    }

    .nav-item.active {
        color: #ff3b3b;
    }

    .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 13px;
        z-index: 1100;
        animation: fadeInUp 0.3s ease;
    }

    .toast.error {
        background: #b00020;
    }

    .toast.success {
        background: #15803d;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    }

    #image-input {
        display: none;
    }
</style>
</head>

<body>

<div class="header">
    <h1>
        <button class="back-btn" onclick="history.back()">←</button>
        Upload Location
    </h1>
</div>

<div class="container">
    <form id="upload-form">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="title" placeholder="Enter location title" required>
        </div>

        <div class="form-group">
            <label>Description *</label>
            <textarea id="description" placeholder="Describe this location..." required></textarea>
        </div>

        <div class="form-group">
            <label>Coordinates *</label>
            <div class="coordinate-input-group">
                <input type="text" id="coordinates" placeholder="Paste coordinates (e.g., 44.8614, -92.6238 or 44°51'41\"N 92°37'25\"W)">
                <button type="button" class="paste-btn" id="paste-coords-btn">
                    <i class="fas fa-paste"></i> Paste
                </button>
            </div>
            <div id="coordinate-preview" class="coordinate-preview"></div>
            <button type="button" class="get-location-btn" id="get-location-btn">
                <i class="fas fa-location-dot"></i> Use My Current Location
            </button>
        </div>

        <div class="form-group">
            <label>Photos (up to 9 - optional)</label>
            <div class="image-upload-area" id="image-upload-area">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Click to upload photos</p>
                <p style="font-size: 12px; color: #999;">Up to 9 images (optional)</p>
            </div>
            <div class="image-preview-grid" id="image-preview-grid"></div>
            <input type="file" id="image-input" multiple accept="image/jpeg,image/png,image/jpg">
        </div>

        <div class="form-group">
            <label>Difficulty Level *</label>
            <div class="level-options" id="level-options"></div>
        </div>

        <div class="form-group">
            <label>Tags</label>
            <div class="tags-container" id="tags-container"></div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Publish Location</button>
    </form>
</div>

<div class="bottom-nav">
    <a href="/map.html" class="nav-item">
        <i class="fas fa-map"></i>
        <span>Map</span>
    </a>
    <a href="/upload.html" class="nav-item active">
        <i class="fas fa-plus-circle"></i>
        <span>Upload</span>
    </a>
</div>

<script>
const CLOUD_NAME = "dmwqfzdyt";
const UPLOAD_PRESET = "urbex_upload";

let selectedFiles = [];
let selectedLevel = null;
let selectedTags = [];
let levelsData = [];
let tagsData = [];
let currentCoordinates = null;

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function parseCoordinates(input) {
    input = input.trim();
    
    let match = input.match(/^(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)$/);
    if (match) {
        return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    }
    
    match = input.match(/^(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)$/);
    if (match) {
        return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    }
    
    const dmsMatch = input.match(/(\d+)°(\d+)'(\d+)"([NS])\s+(\d+)°(\d+)'(\d+)"([EW])/i);
    if (dmsMatch) {
        let lat = parseInt(dmsMatch[1]) + parseInt(dmsMatch[2])/60 + parseInt(dmsMatch[3])/3600;
        if (dmsMatch[4] === 'S') lat = -lat;
        
        let lng = parseInt(dmsMatch[5]) + parseInt(dmsMatch[6])/60 + parseInt(dmsMatch[7])/3600;
        if (dmsMatch[8] === 'W') lng = -lng;
        
        return { lat, lng };
    }
    
    const dmmMatch = input.match(/(\d+)°([\d.]+)'([NS])\s+(\d+)°([\d.]+)'([EW])/i);
    if (dmmMatch) {
        let lat = parseInt(dmmMatch[1]) + parseFloat(dmmMatch[2])/60;
        if (dmmMatch[3] === 'S') lat = -lat;
        
        let lng = parseInt(dmmMatch[4]) + parseFloat(dmmMatch[5])/60;
        if (dmmMatch[6] === 'W') lng = -lng;
        
        return { lat, lng };
    }
    
    return null;
}

function updateCoordinatePreview() {
    const input = document.getElementById('coordinates').value;
    const previewDiv = document.getElementById('coordinate-preview');
    
    if (!input.trim()) {
        previewDiv.classList.remove('show');
        currentCoordinates = null;
        return;
    }
    
    const coords = parseCoordinates(input);
    if (coords && !isNaN(coords.lat) && !isNaN(coords.lng)) {
        currentCoordinates = coords;
        previewDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #15803d;"></i> Parsed: ${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`;
        previewDiv.classList.add('show');
    } else {
        previewDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #b00020;"></i> Invalid format. Use formats like: 44.8614, -92.6238 or 44°51'41"N 92°37'25"W`;
        previewDiv.classList.add('show');
        currentCoordinates = null;
    }
}

function getCurrentLocation() {
    if (!navigator.geolocation) {
        showToast('Geolocation not supported', 'error');
        return;
    }
    
    showToast('Getting your location...', 'info');
    
    navigator.geolocation.getCurrentPosition(
        (position) => {
            const { latitude, longitude } = position.coords;
            document.getElementById('coordinates').value = `${latitude}, ${longitude}`;
            updateCoordinatePreview();
            showToast('Location detected!', 'success');
        },
        (error) => {
            let errorMessage = 'Could not get location';
            if (error.code === 1) errorMessage = 'Permission denied. Please allow location access.';
            if (error.code === 2) errorMessage = 'Location unavailable';
            showToast(errorMessage, 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

async function loadLevels() {
    try {
        const response = await fetch('/assets/json/levels.json');
        if (response.ok) {
            levelsData = await response.json();
        } else {
            throw new Error('Failed to load levels');
        }
    } catch (error) {
        console.error('Error loading levels:', error);
        levelsData = [
            { name: 'Beginner', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'beginner' },
            { name: 'Intermediate', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'intermediate' },
            { name: 'Advanced', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'advanced' },
            { name: 'Expert', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'expert' }
        ];
    }
    displayLevels();
}

function displayLevels() {
    const container = document.getElementById('level-options');
    container.innerHTML = '';
    levelsData.forEach(level => {
        const div = document.createElement('div');
        div.className = 'level-option';
        div.dataset.value = level.value;
        div.innerHTML = `
            <img src="${level.icon}" alt="${level.name}">
            <span>${level.name}</span>
        `;
        div.addEventListener('click', () => {
            document.querySelectorAll('.level-option').forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            selectedLevel = level;
        });
        container.appendChild(div);
    });
}

async function loadTags() {
    try {
        const response = await fetch('/assets/json/tags.json');
        if (response.ok) {
            tagsData = await response.json();
        } else {
            throw new Error('Failed to load tags');
        }
    } catch (error) {
        console.error('Error loading tags:', error);
        tagsData = [
            { name: 'Abandoned', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'abandoned' },
            { name: 'Nature', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'nature' },
            { name: 'Urban', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'urban' },
            { name: 'Historical', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'historical' }
        ];
    }
    displayTags();
}

function displayTags() {
    const container = document.getElementById('tags-container');
    container.innerHTML = '';
    tagsData.forEach(tag => {
        const chip = document.createElement('div');
        chip.className = 'tag-chip';
        chip.dataset.value = tag.value;
        chip.innerHTML = `
            <img src="${tag.icon}" alt="${tag.name}">
            <span>${tag.name}</span>
        `;
        chip.addEventListener('click', () => {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                chip.classList.remove('selected');
            } else {
                selectedTags.push(tag);
                chip.classList.add('selected');
            }
        });
        container.appendChild(chip);
    });
}

const imageUploadArea = document.getElementById('image-upload-area');
const imageInput = document.getElementById('image-input');
const imagePreviewGrid = document.getElementById('image-preview-grid');

imageUploadArea.addEventListener('click', () => {
    imageInput.click();
});

imageInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    handleFiles(files);
});

function handleFiles(files) {
    const imageFiles = files.filter(f => f.type.startsWith('image/'));
    const totalFiles = selectedFiles.length + imageFiles.length;
    
    if (totalFiles > 9) {
        showToast('Maximum 9 images allowed', 'error');
        return;
    }
    
    imageFiles.forEach(file => {
        selectedFiles.push(file);
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'image-preview';
            const idx = selectedFiles.length - 1;
            previewDiv.innerHTML = `
                <img src="${e.target.result}" alt="Preview">
                <button class="remove-image" onclick="removeImage(${idx})">×</button>
            `;
            imagePreviewGrid.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    });
    
    imageInput.value = '';
}

window.removeImage = function(index) {
    selectedFiles.splice(index, 1);
    refreshImagePreview();
}

function refreshImagePreview() {
    imagePreviewGrid.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'image-preview';
            previewDiv.innerHTML = `
                <img src="${e.target.result}" alt="Preview">
                <button class="remove-image" onclick="removeImage(${idx})">×</button>
            `;
            imagePreviewGrid.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    });
}

async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);

    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.secure_url) {
            return data.secure_url;
        } else {
            throw new Error(data.error?.message || 'Upload failed');
        }
    } catch (error) {
        console.error('Cloudinary upload error:', error);
        throw error;
    }
}

async function uploadAllImages() {
    if (selectedFiles.length === 0) {
        return [];
    }
    
    const uploadedUrls = [];
    
    for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        
        try {
            showToast(`Uploading image ${i + 1}/${selectedFiles.length}...`, 'info');
            const url = await uploadToCloudinary(file);
            uploadedUrls.push(url);
        } catch (error) {
            console.error('Upload error:', error);
            showToast(`Failed to upload "${file.name}"`, 'error');
            return null;
        }
    }
    
    showToast(`Successfully uploaded ${uploadedUrls.length} images!`, 'success');
    return uploadedUrls;
}

async function submitLocation(e) {
    e.preventDefault();
    
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const coordinatesInput = document.getElementById('coordinates').value.trim();
    
    if (!title) {
        showToast('Please enter a title', 'error');
        return;
    }
    
    if (!description) {
        showToast('Please enter a description', 'error');
        return;
    }
    
    if (!coordinatesInput) {
        showToast('Please enter coordinates', 'error');
        return;
    }
    
    if (!currentCoordinates) {
        showToast('Please enter valid coordinates', 'error');
        return;
    }
    
    if (!selectedLevel) {
        showToast('Please select a difficulty level', 'error');
        return;
    }
    
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    
    let imageUrls = [];
    if (selectedFiles.length > 0) {
        imageUrls = await uploadAllImages();
        if (imageUrls === null) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Publish Location';
            return;
        }
    }
    
    const locationData = {
        title,
        description,
        images: imageUrls,
        level: selectedLevel,
        tags: selectedTags.map(t => t.value),
        coordinates: currentCoordinates
    };
    
    try {
        const response = await fetch('/locations/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(locationData)
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            showToast('Location submitted for approval!', 'success');
            setTimeout(() => {
                window.location.href = '/map.html';
            }, 1500);
        } else {
            showToast(data.error || 'Failed to submit location', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Publish Location';
        }
    } catch (error) {
        console.error('Submit error:', error);
        showToast('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Publish Location';
    }
}

async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('coordinates').value = text;
        updateCoordinatePreview();
        showToast('Coordinates pasted!', 'success');
    } catch (err) {
        showToast('Could not paste. Please allow clipboard access.', 'error');
    }
}

document.getElementById('coordinates').addEventListener('input', updateCoordinatePreview);
document.getElementById('get-location-btn').addEventListener('click', getCurrentLocation);
document.getElementById('paste-coords-btn').addEventListener('click', pasteFromClipboard);
document.getElementById('upload-form').addEventListener('submit', submitLocation);

loadLevels();
loadTags();
</script>
</body>
</html>
