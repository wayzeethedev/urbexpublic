<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Upload Location - Vestige</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        background: #f5f5f5;
        padding-bottom: 20px;
    }

    .header {
        background: white;
        padding: 15px 20px;
        border-bottom: 1px solid #e5e5e5;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .header h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .back-btn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        padding: 5px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 40px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 14px;
        font-family: inherit;
        background: white;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: #ff3b3b;
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .location-type-toggle {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        background: #f0f0f0;
        padding: 4px;
        border-radius: 40px;
    }

    .toggle-btn {
        flex: 1;
        text-align: center;
        padding: 10px;
        border-radius: 32px;
        cursor: pointer;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.2s;
        background: transparent;
        border: none;
    }

    .toggle-btn.active {
        background: #ff3b3b;
        color: white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .coordinate-input-group {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
    }

    .coordinate-input-group input {
        flex: 1;
        min-width: 150px;
    }

    .paste-btn, .open-map-btn {
        padding: 12px 16px;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        white-space: nowrap;
    }

    .open-map-btn {
        background: #111;
        color: white;
        border: none;
    }

    .paste-btn:hover, .open-map-btn:hover {
        opacity: 0.85;
    }

    .coordinate-preview, .area-preview {
        margin-top: 10px;
        padding: 10px;
        background: #f8f8f8;
        border-radius: 8px;
        font-size: 12px;
        color: #666;
        display: none;
        word-break: break-all;
    }

    .coordinate-preview.show, .area-preview.show {
        display: block;
    }

    .get-location-btn {
        background: #111;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 10px;
        width: 100%;
        font-size: 14px;
    }

    .image-upload-area {
        border: 2px dashed #ddd;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        background: #fafafa;
    }

    .image-upload-area:hover {
        border-color: #ff3b3b;
    }

    .image-upload-area i {
        font-size: 40px;
        color: #999;
        margin-bottom: 10px;
    }

    .image-preview-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 15px;
    }

    .image-preview {
        position: relative;
        aspect-ratio: 1;
        border-radius: 12px;
        overflow: hidden;
        background: #f0f0f0;
    }

    .image-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .remove-image {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        font-size: 12px;
    }

    .level-options, .category-options {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 12px;
        margin-top: 10px;
    }

    .level-option, .category-option {
        background: white;
        border: 2px solid #e5e5e5;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .level-option.selected, .category-option.selected {
        border-color: #ff3b3b;
        background: #fff5f5;
    }

    .level-option img, .category-option img {
        width: 40px;
        height: 40px;
        object-fit: contain;
        margin-bottom: 8px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .level-option span, .category-option span {
        font-size: 12px;
        font-weight: 500;
        display: block;
    }

    .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
    }

    .tag-chip {
        background: white;
        border: 2px solid #e5e5e5;
        border-radius: 30px;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .tag-chip.selected {
        border-color: #ff3b3b;
        background: #fff5f5;
    }

    .tag-chip img {
        width: 20px;
        height: 20px;
        object-fit: contain;
    }

    .tag-chip span {
        font-size: 13px;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: #ff3b3b;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
    }

    .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 13px;
        z-index: 1100;
        animation: fadeInUp 0.3s ease;
    }

    .toast.error {
        background: #b00020;
    }

    .toast.success {
        background: #15803d;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    }

    #image-input {
        display: none;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        width: 90%;
        max-width: 800px;
        height: 80%;
        border-radius: 24px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .modal-header {
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
    }

    .modal-header button {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
    }

    #area-map {
        flex: 1;
        width: 100%;
    }

    .map-controls {
        margin: 12px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .map-controls button {
        padding: 10px 20px;
        background: #ff3b3b;
        color: white;
        border: none;
        border-radius: 40px;
        font-weight: bold;
        cursor: pointer;
    }

    .map-controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .map-controls button.secondary {
        background: #666;
    }

    .map-controls button.toggle-layer {
        background: #2196F3;
    }
</style>
</head>
<body>

<div class="header">
    <h1>
        <button class="back-btn" onclick="history.back()">←</button>
        Upload Location
    </h1>
</div>

<div class="container">
    <form id="upload-form">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" id="title" placeholder="Enter location title" required>
        </div>

        <div class="form-group">
            <label>Description *</label>
            <textarea id="description" placeholder="Describe this location..." required></textarea>
        </div>

        <div class="form-group">
            <label>Location Type * (choose either point OR area)</label>
            <div class="location-type-toggle">
                <button type="button" class="toggle-btn active" data-type="point">📍 Point (Coordinates)</button>
                <button type="button" class="toggle-btn" data-type="area">🗺️ Area (Polygon)</button>
            </div>
            
            <div id="point-section">
                <div class="coordinate-input-group">
                    <input type="text" id="coordinates" placeholder="Paste coordinates (e.g., 44.8614, -92.6238)">
                    <button type="button" class="paste-btn" id="paste-coords-btn"><i class="fas fa-paste"></i> Paste</button>
                    <button type="button" class="open-map-btn" id="open-point-map-btn"><i class="fas fa-map-marker-alt"></i> Map</button>
                </div>
                <div id="coordinate-preview" class="coordinate-preview"></div>
                <button type="button" class="get-location-btn" id="get-location-btn"><i class="fas fa-location-dot"></i> Use My Current Location</button>
            </div>

            <div id="area-section" style="display: none;">
                <div class="coordinate-input-group">
                    <input type="text" id="area-summary" placeholder="Area: not defined" readonly style="background:#f5f5f5;">
                    <button type="button" class="open-map-btn" id="open-area-map-btn"><i class="fas fa-draw-polygon"></i> Draw Area</button>
                </div>
                <div id="area-preview" class="area-preview"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Photos (up to 9 - optional)</label>
            <div class="image-upload-area" id="image-upload-area">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Click to upload photos</p>
                <p style="font-size: 12px; color: #999;">Up to 9 images (optional)</p>
            </div>
            <div class="image-preview-grid" id="image-preview-grid"></div>
            <input type="file" id="image-input" multiple accept="image/jpeg,image/png,image/jpg">
        </div>

        <div class="form-group">
            <label>Category *</label>
            <div class="category-options" id="category-options">
                <div style="text-align: center; padding: 20px;">Loading categories...</div>
            </div>
        </div>

        <div class="form-group">
            <label>Difficulty Level *</label>
            <div class="level-options" id="level-options">
                <div style="text-align: center; padding: 20px;">Loading levels...</div>
            </div>
        </div>

        <div class="form-group">
            <label>Tags</label>
            <div class="tags-container" id="tags-container">
                <div style="text-align: center; padding: 20px;">Loading tags...</div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Submit for Approval</button>
    </form>
</div>

<div id="map-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Select Location</h3>
            <button id="close-modal">&times;</button>
        </div>
        <div id="area-map"></div>
        <div class="map-controls" id="map-controls"></div>
    </div>
</div>

<script>
const CLOUD_NAME = "dmwqfzdyt";
const UPLOAD_PRESET = "urbex_upload";

let selectedFiles = [];
let selectedLevel = null;
let selectedTags = [];
let selectedCategory = null;
let levelsData = [];
let tagsData = [];
let categoriesData = [];

let locationType = "point";
let currentPointCoords = null;
let currentAreaPolygon = null;

let currentMap = null;
let mapResolve = null;
let currentTileLayer = null;
let currentLabelLayer = null;
let isSatellite = false;

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function parseCoordinates(input) {
    input = input.trim();
    let match = input.match(/^(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)$/);
    if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    match = input.match(/^(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)$/);
    if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
    return null;
}

function updatePointPreview() {
    const input = document.getElementById('coordinates').value;
    const previewDiv = document.getElementById('coordinate-preview');
    if (!input.trim()) {
        previewDiv.classList.remove('show');
        currentPointCoords = null;
        return;
    }
    const coords = parseCoordinates(input);
    if (coords && !isNaN(coords.lat) && !isNaN(coords.lng)) {
        currentPointCoords = coords;
        previewDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #15803d;"></i> Point: ${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}<br>
        <small>GeoJSON: {"type":"Point","coordinates":[${coords.lng},${coords.lat}]}</small>`;
        previewDiv.classList.add('show');
    } else {
        previewDiv.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #b00020;"></i> Invalid format. Use e.g., 44.8614, -92.6238`;
        previewDiv.classList.add('show');
        currentPointCoords = null;
    }
}

function updateAreaPreview() {
    const areaSummary = document.getElementById('area-summary');
    const previewDiv = document.getElementById('area-preview');
    if (currentAreaPolygon && currentAreaPolygon.length >= 3) {
        areaSummary.value = `Area: ${currentAreaPolygon.length} points defined`;
        const ring = currentAreaPolygon.map(p => [p.lng, p.lat]);
        const closedRing = [...ring];
        if (closedRing[0][0] !== closedRing[closedRing.length-1][0] || closedRing[0][1] !== closedRing[closedRing.length-1][1]) {
            closedRing.push([closedRing[0][0], closedRing[0][1]]);
        }
        previewDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #15803d;"></i> Polygon with ${currentAreaPolygon.length} vertices<br>
        <small>GeoJSON: {"type":"Polygon","coordinates":[[${closedRing.map(p => `[${p[0]},${p[1]}]`).join(',')}]]}</small>`;
        previewDiv.classList.add('show');
    } else {
        areaSummary.value = 'Area: not defined (click Draw Area)';
        previewDiv.classList.remove('show');
        currentAreaPolygon = null;
    }
}

function destroyMap() {
    if (currentMap) {
        currentMap.remove();
        currentMap = null;
    }
    currentTileLayer = null;
    currentLabelLayer = null;
}

function setMapLayer(isSatelliteView) {
    if (!currentMap) return;
    
    if (currentTileLayer) {
        currentMap.removeLayer(currentTileLayer);
    }
    if (currentLabelLayer) {
        currentMap.removeLayer(currentLabelLayer);
    }
    
    if (isSatelliteView) {
        currentTileLayer = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google'
        }).addTo(currentMap);
        
        currentLabelLayer = L.tileLayer('http://{s}.google.com/vt/lyrs=h&x={x}&y={y}&z={z}', {
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google'
        }).addTo(currentMap);
    } else {
        currentTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(currentMap);
    }
}

function openPointMap() {
    return new Promise((resolve) => {
        mapResolve = resolve;
        isSatellite = false;
        const modal = document.getElementById('map-modal');
        const modalTitle = document.getElementById('modal-title');
        modalTitle.innerText = "Drag marker to set location, then confirm";
        modal.style.display = 'flex';
        
        const controlsDiv = document.getElementById('map-controls');
        controlsDiv.innerHTML = `
            <button id="toggle-layer-btn" class="toggle-layer">🛰️ Satellite</button>
            <button id="confirm-point-btn" class="secondary">✓ Confirm Location</button>
            <button id="cancel-map-btn" class="secondary">✗ Cancel</button>
        `;
        
        setTimeout(() => {
            destroyMap();
            const mapDiv = document.getElementById('area-map');
            mapDiv.innerHTML = '';
            currentMap = L.map(mapDiv).setView([39.8283, -98.5795], 4);
            setMapLayer(false);
            
            let marker = L.marker([39.8283, -98.5795], { draggable: true }).addTo(currentMap);
            
            marker.on('dragend', function() {
                const pos = marker.getLatLng();
                currentMap.setView(pos, currentMap.getZoom());
            });
            
            document.getElementById('toggle-layer-btn').onclick = () => {
                isSatellite = !isSatellite;
                setMapLayer(isSatellite);
                const btn = document.getElementById('toggle-layer-btn');
                btn.innerHTML = isSatellite ? '🗺️ Map' : '🛰️ Satellite';
            };
            
            document.getElementById('confirm-point-btn').onclick = () => {
                const pos = marker.getLatLng();
                resolve({ type: 'point', coords: { lat: pos.lat, lng: pos.lng } });
                modal.style.display = 'none';
                destroyMap();
                controlsDiv.innerHTML = '';
            };
            
            document.getElementById('cancel-map-btn').onclick = () => {
                modal.style.display = 'none';
                destroyMap();
                controlsDiv.innerHTML = '';
                resolve(null);
            };
        }, 100);
    });
}

function openAreaMap() {
    return new Promise((resolve) => {
        mapResolve = resolve;
        isSatellite = false;
        const modal = document.getElementById('map-modal');
        const modalTitle = document.getElementById('modal-title');
        modalTitle.innerText = "Click to add points, Undo to remove last point";
        modal.style.display = 'flex';
        
        const controlsDiv = document.getElementById('map-controls');
        controlsDiv.innerHTML = `
            <button id="toggle-layer-btn" class="toggle-layer">🛰️ Satellite</button>
            <button id="undo-point-btn" class="secondary">↶ Undo Last Point</button>
            <button id="finish-area-btn">✓ Finish Area</button>
            <button id="cancel-area-btn" class="secondary">✗ Cancel</button>
        `;
        
        setTimeout(() => {
            destroyMap();
            const mapDiv = document.getElementById('area-map');
            mapDiv.innerHTML = '';
            currentMap = L.map(mapDiv).setView([39.8283, -98.5795], 4);
            setMapLayer(false);
            
            let polygonPoints = [];
            let currentPolygon = null;
            let markers = [];
            
            function updatePolygon() {
                if (currentPolygon) {
                    currentMap.removeLayer(currentPolygon);
                }
                if (polygonPoints.length >= 3) {
                    currentPolygon = L.polygon(polygonPoints, { color: '#ff3b3b', weight: 3, fillOpacity: 0.3 }).addTo(currentMap);
                } else if (polygonPoints.length === 2) {
                    currentPolygon = L.polyline(polygonPoints, { color: '#ff3b3b', weight: 3 }).addTo(currentMap);
                }
            }
            
            currentMap.on('click', (e) => {
                const point = [e.latlng.lat, e.latlng.lng];
                polygonPoints.push(point);
                
                const marker = L.marker(point, { draggable: true }).addTo(currentMap);
                markers.push(marker);
                
                marker.on('dragend', function() {
                    const newPos = marker.getLatLng();
                    const index = markers.indexOf(marker);
                    if (index !== -1) {
                        polygonPoints[index] = [newPos.lat, newPos.lng];
                        updatePolygon();
                    }
                });
                
                updatePolygon();
            });
            
            document.getElementById('toggle-layer-btn').onclick = () => {
                isSatellite = !isSatellite;
                setMapLayer(isSatellite);
                const btn = document.getElementById('toggle-layer-btn');
                btn.innerHTML = isSatellite ? '🗺️ Map' : '🛰️ Satellite';
            };
            
            document.getElementById('undo-point-btn').onclick = () => {
                if (polygonPoints.length > 0) {
                    polygonPoints.pop();
                    const lastMarker = markers.pop();
                    if (lastMarker) currentMap.removeLayer(lastMarker);
                    updatePolygon();
                } else {
                    showToast('No points to undo', 'error');
                }
            };
            
            document.getElementById('finish-area-btn').onclick = () => {
                if (polygonPoints.length >= 3) {
                    const simplified = polygonPoints.map(p => ({ lat: p[0], lng: p[1] }));
                    resolve({ type: 'area', polygon: simplified });
                    modal.style.display = 'none';
                    destroyMap();
                    controlsDiv.innerHTML = '';
                } else {
                    showToast('Need at least 3 points for an area', 'error');
                }
            };
            
            document.getElementById('cancel-area-btn').onclick = () => {
                modal.style.display = 'none';
                destroyMap();
                controlsDiv.innerHTML = '';
                resolve(null);
            };
        }, 100);
    });
}

async function loadJSONData() {
    try {
        const [levelsRes, tagsRes, categoriesRes] = await Promise.all([
            fetch('/assets/json/levels.json').catch(() => null),
            fetch('/assets/json/tags.json').catch(() => null),
            fetch('/assets/json/categories.json').catch(() => null)
        ]);
        
        if (levelsRes && levelsRes.ok) {
            levelsData = await levelsRes.json();
        } else {
            console.warn('Failed to load levels.json, using defaults');
            levelsData = [
                { name: 'Beginner', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'beginner' },
                { name: 'Intermediate', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'intermediate' },
                { name: 'Advanced', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'advanced' },
                { name: 'Expert', icon: 'https://cdn-icons-png.flaticon.com/512/9584/9584876.png', value: 'expert' }
            ];
        }
        
        if (categoriesRes && categoriesRes.ok) {
            categoriesData = await categoriesRes.json();
        } else {
            console.warn('Failed to load categories.json, using defaults');
            categoriesData = [

function displayLevels() {
    const container = document.getElementById('level-options');
    container.innerHTML = '';
    levelsData.forEach(level => {
        const div = document.createElement('div');
        div.className = 'level-option';
        div.innerHTML = `<img src="${level.icon}" alt="${level.name}"><span>${level.name}</span>`;
        div.addEventListener('click', () => {
            document.querySelectorAll('.level-option').forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            selectedLevel = level;
        });
        container.appendChild(div);
    });
}

function displayCategories() {
    const container = document.getElementById('category-options');
    container.innerHTML = '';
    categoriesData.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category-option';
        div.innerHTML = `<img src="${cat.icon}" alt="${cat.name}"><span>${cat.name}</span>`;
        div.addEventListener('click', () => {
            document.querySelectorAll('.category-option').forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            selectedCategory = cat;
        });
        container.appendChild(div);
    });
}

function displayTags() {
    const container = document.getElementById('tags-container');
    container.innerHTML = '';
    tagsData.forEach(tag => {
        const chip = document.createElement('div');
        chip.className = 'tag-chip';
        chip.innerHTML = `<img src="${tag.icon}" alt="${tag.name}"><span>${tag.name}</span>`;
        chip.addEventListener('click', () => {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                chip.classList.remove('selected');
            } else {
                selectedTags.push(tag);
                chip.classList.add('selected');
            }
        });
        container.appendChild(chip);
    });
}

document.getElementById('open-point-map-btn').addEventListener('click', async () => {
    const result = await openPointMap();
    if (result && result.type === 'point') {
        document.getElementById('coordinates').value = `${result.coords.lat}, ${result.coords.lng}`;
        updatePointPreview();
    }
});

document.getElementById('open-area-map-btn').addEventListener('click', async () => {
    const result = await openAreaMap();
    if (result && result.type === 'area') {
        currentAreaPolygon = result.polygon;
        updateAreaPreview();
    }
});

document.getElementById('close-modal').addEventListener('click', () => {
    document.getElementById('map-modal').style.display = 'none';
    destroyMap();
    if (mapResolve) mapResolve(null);
});

function getCurrentLocation() {
    if (!navigator.geolocation) {
        showToast('Geolocation not supported', 'error');
        return;
    }
    showToast('Getting your location...', 'info');
    navigator.geolocation.getCurrentPosition(
        (position) => {
            const { latitude, longitude } = position.coords;
            document.getElementById('coordinates').value = `${latitude}, ${longitude}`;
            updatePointPreview();
            showToast('Location detected!', 'success');
        },
        (error) => {
            let errorMessage = 'Could not get location';
            if (error.code === 1) errorMessage = 'Permission denied';
            showToast(errorMessage, 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

const imageUploadArea = document.getElementById('image-upload-area');
const imageInput = document.getElementById('image-input');
const imagePreviewGrid = document.getElementById('image-preview-grid');

imageUploadArea.addEventListener('click', () => imageInput.click());
imageInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));

function handleFiles(files) {
    const imageFiles = files.filter(f => f.type.startsWith('image/'));
    if (selectedFiles.length + imageFiles.length > 9) {
        showToast('Maximum 9 images', 'error');
        return;
    }
    imageFiles.forEach(file => {
        selectedFiles.push(file);
    });
    refreshImagePreview();
    imageInput.value = '';
}

window.removeImage = function(index) {
    selectedFiles.splice(index, 1);
    refreshImagePreview();
};

function refreshImagePreview() {
    imagePreviewGrid.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewDiv = document.createElement('div');
            previewDiv.className = 'image-preview';
            previewDiv.innerHTML = `<img src="${e.target.result}" alt="Preview"><button class="remove-image" onclick="removeImage(${idx})">×</button>`;
            imagePreviewGrid.appendChild(previewDiv);
        };
        reader.readAsDataURL(file);
    });
}

async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
    const data = await response.json();
    if (!data.secure_url) throw new Error(data.error?.message || 'Upload failed');
    return data.secure_url;
}

async function uploadAllImages() {
    if (selectedFiles.length === 0) return [];
    const urls = [];
    for (let i = 0; i < selectedFiles.length; i++) {
        showToast(`Uploading ${i+1}/${selectedFiles.length}...`, 'info');
        const url = await uploadToCloudinary(selectedFiles[i]);
        urls.push(url);
    }
    showToast(`Uploaded ${urls.length} images`, 'success');
    return urls;
}

document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        locationType = btn.dataset.type;
        if (locationType === 'point') {
            document.getElementById('point-section').style.display = 'block';
            document.getElementById('area-section').style.display = 'none';
        } else {
            document.getElementById('point-section').style.display = 'none';
            document.getElementById('area-section').style.display = 'block';
            updateAreaPreview();
        }
    });
});

document.getElementById('coordinates').addEventListener('input', updatePointPreview);
document.getElementById('get-location-btn').addEventListener('click', getCurrentLocation);
document.getElementById('paste-coords-btn').addEventListener('click', async () => {
    try {
        const text = await navigator.clipboard.readText();
        if (text) { 
            document.getElementById('coordinates').value = text; 
            updatePointPreview(); 
            showToast('Pasted', 'success');
        }
    } catch(err) {
        showToast('Clipboard access denied', 'error');
    }
});

document.getElementById('upload-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    if (!title || !description) return showToast('Title & description required', 'error');
    if (!selectedCategory) return showToast('Please select a category', 'error');
    if (!selectedLevel) return showToast('Please select difficulty', 'error');
    
    let geometry = null;
    if (locationType === 'point') {
        if (!currentPointCoords) return showToast('Provide valid coordinates', 'error');
        geometry = { 
            type: 'Point', 
            coordinates: [currentPointCoords.lng, currentPointCoords.lat] 
        };
    } else {
        if (!currentAreaPolygon || currentAreaPolygon.length < 3) return showToast('Draw a valid area polygon', 'error');
        const ring = currentAreaPolygon.map(p => [p.lng, p.lat]);
        const closedRing = [...ring];
        if (closedRing[0][0] !== closedRing[closedRing.length-1][0] || closedRing[0][1] !== closedRing[closedRing.length-1][1]) {
            closedRing.push([closedRing[0][0], closedRing[0][1]]);
        }
        geometry = { 
            type: 'Polygon', 
            coordinates: [closedRing] 
        };
    }
    
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    
    let imageUrls = [];
    if (selectedFiles.length) {
        try { 
            imageUrls = await uploadAllImages(); 
        } catch(err) { 
            showToast('Image upload failed', 'error'); 
            submitBtn.disabled = false; 
            submitBtn.textContent = 'Submit for Approval'; 
            return; 
        }
    }
    
    const locationData = {
        title: title,
        description: description,
        images: imageUrls,
        level: selectedLevel.value,
        level_name: selectedLevel.name,
        level_icon: selectedLevel.icon,
        category: selectedCategory.value,
        category_name: selectedCategory.name,
        category_icon: selectedCategory.icon,
        tags: selectedTags.map(t => t.value),
        tag_names: selectedTags.map(t => t.name),
        tag_icons: selectedTags.map(t => t.icon),
        geometry: geometry,
        locationType: locationType
    };
    
    console.log('Submitting location data:', locationData);
    
    try {
        const response = await fetch('/api/locations/create', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            credentials: 'include', 
            body: JSON.stringify(locationData) 
        });
        const data = await response.json();
        if (response.ok && data.success) {
            showToast('Location submitted for approval!', 'success');
            setTimeout(() => window.location.href = '/map.html', 1500);
        } else {
            showToast(data.error || 'Submission failed', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit for Approval';
        }
    } catch (error) {
        console.error('Submit error:', error);
        showToast('Network error: ' + error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit for Approval';
    }
});

loadJSONData();
updatePointPreview();
</script>
